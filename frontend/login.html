<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – TalentLens</title>
    <meta name="description" content="Secure login for TalentLens AI Resume Analyzer." />
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css" />
    <style>
        .hero-gradient {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .tab-btn {
            transition: all 0.3s ease;
        }

        .tab-active {
            background-color: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
            border-bottom: 2px solid #fbbf24;
        }

        .tab-inactive {
            color: #94a3b8;
            border-bottom: 2px solid transparent;
        }

        .tab-inactive:hover {
            color: #e2e8f0;
        }
    </style>
</head>

<body class="hero-gradient min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md animate-fade-up">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4"
                style="background:linear-gradient(135deg,#f59e0b,#e08600)">
                <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            </div>
            <h1 class="text-white font-black text-3xl">TalentLens</h1>
            <p class="text-slate-400 mt-1 text-sm" id="portalSubText">KGiSL Placement Portal · Access</p>
        </div>

        <!-- Login Card -->
        <div class="glass-card rounded-2xl overflow-hidden">
            <!-- Tabs -->
            <div class="flex border-b border-white/10">
                <button id="adminTab" class="w-1/2 py-4 text-sm font-semibold tab-btn tab-active">
                    Admin Login
                </button>
                <button id="candidateTab" class="w-1/2 py-4 text-sm font-semibold tab-btn tab-inactive">
                    Candidate Login
                </button>
            </div>

            <div class="p-8">
                <h2 id="formTitle" class="text-white font-bold text-xl mb-6 text-center">Sign in to Admin Dashboard</h2>

                <form id="loginForm" class="space-y-5">
                    <div>
                        <label class="block text-slate-300 text-sm font-semibold mb-2">Email</label>
                        <div class="relative">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
                                </svg>
                            </span>
                            <input id="email" type="email" placeholder="email@example.com" autocomplete="email" required
                                class="w-full pl-10 pr-4 py-3 rounded-xl border border-white/20 bg-white/10 text-white placeholder-slate-400 focus:outline-none focus:border-yellow-400 focus:bg-white/15 transition" />
                        </div>
                    </div>
                    <div>
                        <label class="block text-slate-300 text-sm font-semibold mb-2">Password</label>
                        <div class="relative">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                </svg>
                            </span>
                            <input id="password" type="password" placeholder="••••••••••"
                                autocomplete="current-password" required
                                class="w-full pl-10 pr-4 py-3 rounded-xl border border-white/20 bg-white/10 text-white placeholder-slate-400 focus:outline-none focus:border-yellow-400 focus:bg-white/15 transition" />
                        </div>
                    </div>
                    <div id="loginError"
                        class="hidden text-red-500 text-sm text-center bg-red-500/10 px-4 py-2 rounded-lg border border-red-500/20">
                    </div>
                    <button type="submit" id="loginBtn"
                        class="w-full text-center py-3 text-base rounded-xl font-bold bg-yellow-500 text-white hover:bg-yellow-400 transition transform hover:scale-[1.02] shadow-lg shadow-yellow-500/30">
                        Sign In to Dashboard
                    </button>

                    <!-- Google Authentication Area (Shown for Candidates only) -->
                    <div id="googleLoginArea" class="hidden animate-fade-in pt-4">
                        <div class="relative flex items-center py-4">
                            <div class="flex-grow border-t border-white/10"></div>
                            <span
                                class="flex-shrink mx-4 text-slate-400 text-xs uppercase tracking-widest font-bold">OR</span>
                            <div class="flex-grow border-t border-white/10"></div>
                        </div>

                        <button id="googleLogin" type="button"
                            class="w-full flex items-center justify-center gap-3 bg-white text-slate-700 border border-slate-200 rounded-xl py-3 hover:bg-slate-50 transition transform hover:scale-[1.02] shadow-sm font-semibold">
                            <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="20" alt="Google">
                            Continue with Google
                        </button>
                    </div>
                </form>

            </div>
        </div>

        <div class="text-center mt-6">
            <a href="/" class="text-slate-400 text-sm hover:text-yellow-400 transition">← Back to Home</a>
        </div>
    </div>

    <!-- Shared Utilities -->
    <script src="/static/js/app.js"></script>

    <!-- Firebase Auth logic -->
    <script type="module" src="/static/js/login.js"></script>
    <script type="module" src="/static/js/google-login.js"></script>
</body>

</html>
