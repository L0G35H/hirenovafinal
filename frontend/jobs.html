<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Roles – TalentLens</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css" />
</head>

<body class="bg-slate-100" style="font-family:'Inter',sans-serif">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="sidebar flex flex-col py-6">
            <div class="px-5 mb-8">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0"
                        style="background:var(--gold)">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                        </svg>
                    </div>
                    <div>
                        <div class="text-white font-black text-base">TalentLens</div>
                        <div class="text-xs" style="color:rgba(245,158,11,0.8)">KGiSL Portal</div>
                    </div>
                </div>
            </div>
            <nav class="flex-1 space-y-1">
                <a href="/dashboard.html" class="sidebar-link"><svg fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>Dashboard</a>
                <a href="/upload.html" class="sidebar-link"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>Upload Resume</a>
                <a href="/candidates.html" class="sidebar-link"><svg fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>Candidates</a>
                <a href="/jobs.html" class="sidebar-link active"><svg fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2-2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>Job Roles</a>
            </nav>
            <div class="px-4 py-4 border-t border-white/10">
                <button id="logoutBtn"
                    class="sidebar-link w-full text-red-400 hover:text-red-300 hover:bg-red-500/10 text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    Logout
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-auto">
            <header class="bg-white border-b border-slate-200 px-8 py-4">
                <h1 class="text-xl font-bold" style="color:var(--navy)">Job Role Manager</h1>
                <p class="text-slate-400 text-sm">Define job roles and select required skills for candidate evaluation
                </p>
            </header>

            <div class="p-8 grid lg:grid-cols-5 gap-8">
                <!-- Form Panel -->
                <div class="lg:col-span-2">
                    <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 sticky top-8">
                        <h2 class="font-bold text-lg mb-5" style="color:var(--navy)" id="formTitle">Create New Job Role
                        </h2>
                        <input type="hidden" id="editingJobId" value="" />

                        <div class="space-y-4">
                            <div>
                                <label class="form-label">Role Name *</label>
                                <input type="text" id="roleName" class="form-input"
                                    placeholder="e.g. Python Backend Developer" />
                            </div>
                            <div>
                                <label class="form-label">Description</label>
                                <textarea id="roleDesc" class="form-input" rows="2"
                                    placeholder="Brief role description…"></textarea>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="form-label">Min. Score Threshold (%)</label>
                                    <input type="number" id="minScore" class="form-input" value="60" min="0"
                                        max="100" />
                                </div>
                                <div>
                                    <label class="form-label">Experience Required</label>
                                    <select id="expRequired" class="form-input">
                                        <option value="Any">Any</option>
                                        <option value="Fresher">Fresher</option>
                                        <option value="1-3 years">1–3 years</option>
                                        <option value="3-5 years">3–5 years</option>
                                        <option value="5+ years">5+ years</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Skill Selection -->
                            <div>
                                <label class="form-label">Required Skills * <span
                                        class="text-slate-400 font-normal text-xs" id="selectedCount">(0
                                        selected)</span></label>
                                <div id="skillsContainer"
                                    class="max-h-72 overflow-y-auto border border-slate-200 rounded-xl p-3 space-y-4">
                                    <p class="text-slate-400 text-sm text-center py-4">Loading skills…</p>
                                </div>
                            </div>

                            <div class="flex gap-3 pt-2">
                                <button onclick="saveJobRole()" class="btn-primary flex-1 py-3">
                                    <span id="saveJobBtnText">Create Job Role</span>
                                </button>
                                <button onclick="cancelEdit()" id="cancelBtn"
                                    class="hidden btn-navy py-3 px-4">Cancel</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Job Roles List -->
                <div class="lg:col-span-3">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="font-bold text-lg" style="color:var(--navy)">Existing Job Roles</h2>
                        <span class="text-slate-400 text-sm"><span id="jobCount">0</span> roles configured</span>
                    </div>
                    <div id="jobRolesList" class="space-y-4">
                        <div class="text-center py-12 text-slate-400">
                            <svg class="w-12 h-12 mx-auto mb-3 opacity-30" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                    d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2-2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                            </svg>
                            <p>No job roles yet. Create your first one!</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="/static/js/role-check.js"></script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/jobs.js"></script>
</body>

</html>
